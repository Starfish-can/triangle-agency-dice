<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AgencyOS - Triangle Agency Dice Pool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { darkMode: 'class', }
    </script>
    <style>
        .agency-bg-light { background-color: #faf9f6; background-image: linear-gradient(rgba(220, 38, 38, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(220, 38, 38, 0.02) 1px, transparent 1px); background-size: 20px 20px; }
        .dark .agency-bg-dark { background-color: #0c0505; background-image: linear-gradient(rgba(220, 38, 38, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(220, 38, 38, 0.03) 1px, transparent 1px); background-size: 20px 20px; }
        .triangle-dice-red { width: 0; height: 0; border-left: 22px solid transparent; border-right: 22px solid transparent; border-bottom: 38px solid #dc2626; position: relative; filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.2)); transition: transform 0.2s ease; }
        .triangle-dice-blue { width: 0; height: 0; border-left: 22px solid transparent; border-right: 22px solid transparent; border-bottom: 38px solid #2563eb; position: relative; filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.2)); transition: transform 0.2s ease; }
        .triangle-dice-red:hover, .triangle-dice-blue:hover { transform: scale(1.1); }
        .triangle-text { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); color: #ffffff; font-weight: 900; font-size: 16px; line-height: 1; }
    </style>
</head>
<body id="main-body" class="agency-bg-light text-neutral-900 min-h-screen flex flex-col font-mono selection:bg-red-600 selection:text-white transition-colors duration-350">

    <header class="border-b-2 border-neutral-900 bg-white dark:bg-neutral-950 dark:border-red-950 px-6 py-4 flex flex-wrap gap-4 justify-between items-center transition-colors">
        <div class="flex items-center gap-3">
            <div class="bg-red-600 text-white dark:text-black px-2.5 py-1 font-black tracking-tighter text-sm rounded-sm uppercase">▲ AgencyOS</div>
            <h1 class="text-md font-black tracking-widest text-neutral-900 dark:text-red-500">PUBLIC TERMINAL // 公共特工骰池</h1>
            <button onclick="toggleTheme()" id="theme-btn" class="ml-2 text-xs bg-neutral-100 hover:bg-neutral-200 dark:bg-neutral-900 dark:hover:bg-neutral-850 text-neutral-700 dark:text-neutral-300 px-2.5 py-1 rounded border border-neutral-300 dark:border-neutral-800 transition flex items-center gap-1.5">
                ☀ 亮色特工终端
            </button>
        </div>
        <div id="status-tag" class="text-xs px-2 py-1 bg-amber-500/10 text-amber-600 border border-amber-500/30 rounded font-bold uppercase">
            CONNECTING // 网关连接中
        </div>
    </header>

    <main class="flex-1 max-w-6xl w-full mx-auto p-4 md:p-6 flex flex-col md:flex-row gap-6">
        <div class="w-full md:w-1/2 flex flex-col gap-6">
            <div class="bg-white dark:bg-neutral-950 border-2 border-neutral-900 dark:border-red-950/60 rounded p-6 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex flex-col justify-between transition-colors">
                <div>
                    <h2 class="text-sm font-black mb-4 text-neutral-950 dark:text-red-500 border-b-2 border-neutral-900 dark:border-red-950 pb-2 tracking-wider">▲ 特工控制台 / AGENT CONSOLE</h2>
                    <div class="mb-5">
                        <label class="block text-xs font-black text-neutral-500 dark:text-neutral-400 mb-1.5">特工代号 / CODE NAME</label>
                        <input type="text" id="username" placeholder="未命名特工" onchange="saveName()" class="w-full bg-neutral-50 dark:bg-black border border-neutral-300 dark:border-neutral-800 rounded px-3 py-2 text-sm focus:outline-none transition">
                    </div>
                    <div class="mb-5">
                        <label class="block text-xs font-black text-neutral-500 dark:text-neutral-400 mb-2">掷骰类型</label>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="flex items-center justify-center gap-2.5 p-3 bg-red-50/50 border-2 border-red-500 rounded cursor-pointer hover:bg-red-100/50">
                                <input type="radio" name="roll-type" value="reality" checked class="w-4 h-4 accent-red-600">
                                <span class="text-xs font-black text-red-750">现实改写</span>
                            </label>
                            <label class="flex items-center justify-center gap-2.5 p-3 bg-blue-50/50 border-2 border-blue-500 rounded cursor-pointer hover:bg-blue-100/50">
                                <input type="radio" name="roll-type" value="anomaly" class="w-4 h-4 accent-blue-600">
                                <span class="text-xs font-black text-blue-750">异常能力</span>
                            </label>
                        </div>
                    </div>
                    <div class="mb-6 bg-neutral-50 p-4 rounded border border-neutral-250">
                        <label class="block text-xs text-neutral-600 font-black mb-2">当前燃尽值</label>
                        <input type="number" id="burnout-value" min="0" max="6" value="1" class="w-20 bg-white border-2 border-neutral-900 text-center text-lg font-black text-red-650 rounded p-2 focus:outline-none">
                    </div>
                    <button onclick="rollAgencyDice()" class="w-full bg-red-600 hover:bg-red-500 text-white font-black py-5 rounded text-lg tracking-widest transition shadow-md border-b-4 border-red-800 active:border-b-0 uppercase">▲ 特工掷骰 (6D4)</button>
                </div>
                <div class="space-y-4 mt-6">
                    <div class="space-y-3 bg-neutral-50 p-4 rounded border border-neutral-250">
                        <label class="flex items-center gap-2.5 cursor-pointer text-xs text-neutral-600 font-bold">
                            <input type="checkbox" id="is-secret" class="w-4 h-4 rounded accent-red-600 bg-neutral-200">
                            <span>暗骰：仅自己可见</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <div id="log-container" class="w-full md:w-1/2 flex flex-col bg-white dark:bg-neutral-950 border-2 border-neutral-900 dark:border-red-950/60 rounded p-6 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] h-[550px] overflow-y-auto">
            <!-- 日志区 -->
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://egtudzuaahkknlvfzgrb.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_beFak4osOEoXcoK668rFpA_t6Vki5Ol";
        const STORAGE_KEY = "agency_dice_history_v20";
        
        let myUID = localStorage.getItem('agency_uid') || Math.random().toString(36).substr(2, 9);
        localStorage.setItem('agency_uid', myUID);
        let myName = localStorage.getItem('agency_nick') || "未命名特工";
        let supabaseClient = null;

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const themeBtn = document.getElementById('theme-btn');
            themeBtn.innerText = document.documentElement.classList.contains('dark') ? "🌙 护眼暗色终端" : "☀ 亮色特工终端";
        }

        function saveName() {
            myName = document.getElementById('username').value.trim() || "未命名特工";
            localStorage.setItem('agency_nick', myName);
            renderAllLogs();
        }

        function initSupabaseSync() {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            supabaseClient.channel('public:agency_rolls')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'agency_rolls' }, payload => {
                    if (payload.new?.payload) handleIncomingRoll(payload.new.payload);
                })
                .subscribe((status) => {
                    const tag = document.getElementById('status-tag');
                    if (status === 'SUBSCRIBED') {
                        tag.innerText = "ONLINE // 中枢已同步";
                        tag.className = "text-xs px-2 py-1 bg-green-500/10 text-green-600 border border-green-500/30 rounded font-bold uppercase";
                    }
                });
        }

        function rollAgencyDice() {
            const rolls = Array.from({length: 6}, () => Math.floor(Math.random() * 4) + 1);
            const countOfThree = rolls.filter(r => r === 3).length;
            const data = {
                id: "roll_" + Date.now(),
                uid: myUID,
                sender: myName,
                rolls: rolls,
                rollType: document.querySelector('input[name="roll-type"]:checked').value,
                countOfThree: countOfThree,
                burnout: parseInt(document.getElementById('burnout-value').value) || 0,
                isSecret: document.getElementById('is-secret').checked
            };
            data.isSuccess = (countOfThree === 3) || (countOfThree - data.burnout >= 1);
            
            pushToLocalHistory(data);
            if (!data.isSecret) supabaseClient.from('agency_rolls').insert([{ payload: data }]);
        }

        function handleIncomingRoll(data) {
            if (!data.isSecret && data.uid !== myUID) pushToLocalHistory(data);
        }

        function pushToLocalHistory(data) {
            let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
            if (!history.some(h => h.id === data.id)) {
                history.unshift(data);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(history.slice(0, 40)));
                renderAllLogs();
            }
        }

        function renderAllLogs() {
            const container = document.getElementById('log-container');
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
            container.innerHTML = history.length === 0 ? '<div class="text-neutral-400 text-center py-12">终端空闲...</div>' : '';
            history.forEach(data => {
                const isSelf = (data.uid === myUID);
                const div = document.createElement('div');
                div.className = "p-4 border-2 border-neutral-900 rounded my-2";
                div.innerHTML = `<strong>${data.sender} ${isSelf?'(YOU)':''}</strong>: 骰子[${data.rolls.join(', ')}] - ${data.isSuccess?'SUCCESS':'FAILURE'}`;
                container.appendChild(div);
            });
        }

        window.onload = () => {
            document.getElementById('username').value = myName;
            initSupabaseSync();
            renderAllLogs();
        };
    </script>
</body>
</html>
